<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ character?.name }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="character-hero">
    <img [src]="'https://cdn.thesimpsonsapi.com/500' + character?.portrait_path" />
    <div class="character-name-badge">
      <h1>{{ character?.name }}</h1>
      <span class="status-badge"
        [class.alive]="character?.status === 'Alive'"
        [class.dead]="character?.status === 'Dead'"
        [class.unknown]="character?.status === 'unknown'">
        ● {{ character?.status | translateField }}
      </span>
    </div>
  </div>

  <div class="info-section">
    <div class="info-card">
      <span class="label">Ocupación</span>
      <span class="value">{{ character?.occupation }}</span>
    </div>
    <div class="info-card">
      <span class="label">Género</span>
      <span class="value">{{ character?.gender | translateField }}</span>
    </div>
    <div class="info-card">
      <span class="label">Edad</span>
      <span class="value">{{ character?.age }} años</span>
    </div>
    <div class="info-card">
      <span class="label">Fecha de nacimiento</span>
      <span class="value">{{ character?.birthdate }}</span>
    </div>
  </div>

  <div class="phrases-section" *ngIf="character?.phrases?.length">
    <h2>Frases icónicas</h2>
    <div class="phrase-bubble" *ngFor="let phrase of character?.phrases?.slice(0, 5)">
      "{{ phrase }}"
    </div>
  </div>
</ion-content>
