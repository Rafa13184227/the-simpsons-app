<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ character?.name }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>
      <ion-thumbnail slot="start">
        <img [src]="'https://thesimpsonsapi.com' + character?.portrait_path" />
      </ion-thumbnail>
      <ion-label>
        <h2>{{ character?.name }}</h2>
        <p>{{ character?.occupation }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Status</h3>
        <p [class.alive]="character?.status === 'Alive'" [class.dead]="character?.status === 'Dead'"
          [class.unknown]="character?.status === 'unknown'">
          ● {{ character?.status }}
        </p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Gender</h3>
        <p>{{ character?.gender }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Age</h3>
        <p>{{ character?.age }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Birthdate</h3>
        <p>{{ character?.birthdate }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Occupation</h3>
        <p>{{ character?.occupation }}</p>
      </ion-label>
    </ion-item>

  </ion-list>
</ion-content>
